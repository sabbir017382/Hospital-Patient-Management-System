<nav class="sidebar" [class.closed]="!isOpen">
  <div class="sidebar-header">
    <div>
      <p class="sidebar-subtitle">Admin panel</p>
    </div>
    <button mat-icon-button class="close-btn" (click)="closeSidebar()">
      <mat-icon>chevron_left</mat-icon>
    </button>
  </div>

  <ul class="sidebar-list">
    <li
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>dashboard</mat-icon>
      <span>Dashboard</span>
    </li>
    <li routerLink="/patients" routerLinkActive="active">
      <mat-icon>group</mat-icon>
      <span>Patient Dashboard</span>
    </li>
    <li routerLink="/patients/new" routerLinkActive="active">
      <mat-icon>person_add</mat-icon>
      <span>Patient Form</span>
    </li>
    <li routerLink="/analytics" routerLinkActive="active">
      <mat-icon>analytics</mat-icon>
      <span>Analytics Dashboard</span>
    </li>
    <li class="sidebar-parent" (click)="toggleDoctorMenu()">
      <mat-icon>medical_services</mat-icon>
      <span>Doctor</span>
      <mat-icon class="expand-icon">
        {{ doctorMenuOpen ? "expand_less" : "expand_more" }}
      </mat-icon>
    </li>
    <ul class="sidebar-submenu" *ngIf="doctorMenuOpen">
      <li routerLink="/create-doctor" routerLinkActive="active">
        <mat-icon>add</mat-icon>
        <span>Add Doctor</span>
      </li>
      <li routerLink="/doctors" routerLinkActive="active">
        <mat-icon>list</mat-icon>
        <span>Doctor List</span>
      </li>
    </ul>
  </ul>
</nav>
