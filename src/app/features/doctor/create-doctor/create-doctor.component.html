<div class="create-doctor-page">
  <h1>Add Doctor</h1>

  <form
    #doctorForm="ngForm"
    (ngSubmit)="onSubmit(doctorForm)"
    class="doctor-form"
  >
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Doctor Name</mat-label>
        <input
          matInput
          name="doctorName"
          required
          [(ngModel)]="doctor.doctorName"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Qualification</mat-label>
        <input
          matInput
          name="qualification"
          [(ngModel)]="doctor.qualification"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Specialty</mat-label>
        <input matInput name="specialty" [(ngModel)]="doctor.specialty" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput name="email" [(ngModel)]="doctor.email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Phone</mat-label>
        <input matInput name="phone" [(ngModel)]="doctor.phone" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Consultation Fee</mat-label>
        <input
          matInput
          type="number"
          name="consultationFee"
          [(ngModel)]="doctor.consultationFee"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Designation</mat-label>
        <input matInput name="designation" [(ngModel)]="doctor.designation" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Institute</mat-label>
        <input matInput name="institute" [(ngModel)]="doctor.institute" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Department</mat-label>
        <input
          matInput
          name="departmentName"
          [(ngModel)]="doctor.departmentName"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Branch Name</mat-label>
        <input matInput name="branchName" [(ngModel)]="doctor.branchName" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Floor Number</mat-label>
        <input matInput name="floorNumber" [(ngModel)]="doctor.floorNumber" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Room Number</mat-label>
        <input
          matInput
          type="number"
          name="roomNumber"
          [(ngModel)]="doctor.roomNumber"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Branch Address</mat-label>
        <input
          matInput
          name="branchAddress"
          [(ngModel)]="doctor.branchAddress"
        />
      </mat-form-field>

      <!-- ✅ Image Upload (simple & fast) -->
      <mat-form-field appearance="outline">
        <mat-label>Doctor Image</mat-label>

        <input
          matInput
          readonly
          [value]="uploadedFileName"
          placeholder="Click to upload"
          (click)="fileInput.click()"
        />

        <button
          mat-button
          matSuffix
          type="button"
          class="upload-badge"
          (click)="fileInput.click()"
        >
          <mat-icon>{{ imageUploaded ? "check" : "cloud_upload" }}</mat-icon>
          {{ imageUploaded ? "Uploaded" : "Upload" }}
        </button>

        <input
          #fileInput
          type="file"
          hidden
          accept="image/*"
          (change)="onFileSelected($event)"
        />
      </mat-form-field>
    </div>

    <!-- Availability -->
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Chamber Start</mat-label>
        <mat-select name="start" [(ngModel)]="doctor.chamberTime.start">
          <mat-option *ngFor="let t of timeSlots" [value]="t">{{
            t
          }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Chamber End</mat-label>
        <mat-select name="end" [(ngModel)]="doctor.chamberTime.end">
          <mat-option *ngFor="let t of timeSlots" [value]="t">{{
            t
          }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Available Days</mat-label>
        <mat-select
          name="availableDays"
          [(ngModel)]="doctor.availableDays"
          multiple
        >
          <mat-option *ngFor="let d of daysOfWeek" [value]="d">{{
            d
          }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Off Days</mat-label>
        <mat-select name="offDays" [(ngModel)]="doctor.OffDays" multiple>
          <mat-option *ngFor="let d of daysOfWeek" [value]="d">{{
            d
          }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="form-footer">
      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="imageUploadLoading"
      >
        Add Doctor
      </button>

      <button mat-button type="button" (click)="onReset(doctorForm)">
        Reset
      </button>
    </div>

    <div class="error" *ngIf="duplicateErrorMessage">
      {{ duplicateErrorMessage }}
    </div>
  </form>
</div>
